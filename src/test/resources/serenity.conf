serenity {
  project.name = "ParaBank Automation"
  take.screenshots = AFTER_EACH_STEP
}

webdriver {
  driver = chrome
  autodownload = true
  timeouts {
    implicitly.wait = 5000
    wait.for.timeout = 10000
  }
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = [
        "--start-maximized",
        "--disable-infobars",
        "--disable-notifications",
        "--disable-extensions",
        "--no-sandbox",
        "--disable-dev-shm-usage"
      ]
    }
  }
}

environments {
  default {
    base.url = "https://parabank.parasoft.com/parabank"
  }
}
